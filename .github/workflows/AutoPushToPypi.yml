name: Publish easyclimate to PyPI

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  BuildLinux:
    name: Build Linux wheels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build manylinux wheels with Maturin
        run: |
          bash ./scripts/build_manylinux_wheel.sh

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist/

  BuildMacOS:
    name: Build macOS wheels (${{ matrix.runner }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            python-version: '3.10'
          - runner: macos-13
            python-version: '3.11'
          - runner: macos-13
            python-version: '3.12'
          - runner: macos-13
            python-version: '3.13'
          - runner: macos-13
            python-version: '3.14'
          - runner: macos-14
            python-version: '3.10'
          - runner: macos-14
            python-version: '3.11'
          - runner: macos-14
            python-version: '3.12'
          - runner: macos-14
            python-version: '3.13'
          - runner: macos-14
            python-version: '3.14'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install build dependencies
        run: python -m pip install --upgrade pip maturin

      - name: Build macOS wheel
        run: python -m maturin build --release --interpreter python --out dist

      - name: Verify built wheel
        shell: bash
        run: |
          python -m pip install --force-reinstall "$(find dist -name '*.whl' | head -n 1)"
          python -c "import easyclimate_rust; print('easyclimate_rust import ok')"

      - name: Upload macOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-macos-${{ matrix.runner }}-py${{ matrix.python-version }}
          path: dist/

  BuildWindows:
    name: Build Windows wheels
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows wheels
        shell: pwsh
        run: |
          ./scripts/build_manywindows_wheel.ps1

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/

  Publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - BuildLinux
      - BuildMacOS
      - BuildWindows
    permissions:
      id-token: write
      contents: write
    environment:
      name: pypi

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-linux
          path: dist/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: dist/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-macos-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.whl
            dist/**/*.tar.gz
