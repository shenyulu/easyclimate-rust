name: Publish easyclimate to PyPI

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  BuildLinux:
    name: Build Linux wheels
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build manylinux wheels with Maturin
        run: |
          bash ./scripts/build_manylinux_wheel.sh

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist/

  BuildMacOS:
    name: Build macOS wheels (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Intel / x86_64
          - runner: macos-15-intel
            artifact-name: dist-macos-x86_64

          # Apple Silicon / arm64
          - runner: macos-15
            artifact-name: dist-macos-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build macOS wheels
        shell: bash
        run: |
          bash ./scripts/build_macos_wheel.sh

      - name: Verify built wheels
        shell: bash
        run: |
          ls -lh dist/*.whl

          python3 -m pip install --upgrade pip
          python3 -m pip install --force-reinstall "$(find dist -name '*cp312*.whl' | head -n 1)"
          python3 -c "import easyclimate_rust; print('easyclimate_rust import ok')"

      - name: Upload macOS build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/

  BuildWindows:
    name: Build Windows wheels
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Windows wheels
        shell: pwsh
        run: |
          ./scripts/build_manywindows_wheel.ps1

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows
          path: dist/

  Publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - BuildLinux
      - BuildMacOS
      - BuildWindows
    permissions:
      id-token: write
      contents: write
    environment:
      name: pypi

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-linux
          path: dist/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-windows
          path: dist/

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-macos-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.whl
            dist/**/*.tar.gz
